name: Test

on:
  push:
    branches:
      - main
      - beta
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Read pinned Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Install Dart (for fvm bootstrap)
        uses: dart-lang/setup-dart@v1

      - name: Cache fvm versions
        uses: actions/cache@v4
        with:
          path: ~/fvm/versions
          key: fvm-${{ runner.os }}-${{ steps.fvm.outputs.version }}

      - name: Install fvm and pinned Flutter
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.pub-cache/bin:$PATH"
          npm run setup:flutter

      - name: Install Flutter dependencies
        run: fvm flutter pub get

      - name: Check formatting
        run: npm run format:check

      - name: Analyze
        run: npm run analyze

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Enforce coverage threshold
        env:
          MIN_COVERAGE: "55"
        run: npm run coverage:check

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
