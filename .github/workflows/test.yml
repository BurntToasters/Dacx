name: Test

on:
  push:
    branches:
      - main
      - beta
  pull_request:
    branches:
      - main
      - beta

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Repository checks (version, static, hygiene, metainfo)
        run: |
          npm run check:version
          npm run check:static
          npm run check:hygiene
          npm run check:metainfo

      - name: Read pinned Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Install Dart (for fvm bootstrap)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Cache fvm versions
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/fvm/versions
          key: fvm-${{ runner.os }}-${{ steps.fvm.outputs.version }}

      - name: Install fvm and pinned Flutter
        run: |
          dart pub global activate fvm
          PUB_BIN="${PUB_CACHE:-$HOME/.pub-cache}/bin"
          echo "$PUB_BIN" >> "$GITHUB_PATH"
          export PATH="$PUB_BIN:$PATH"
          npm run setup:flutter

      - name: Install Flutter dependencies
        run: fvm flutter pub get

      - name: Check formatting
        run: npm run format:check

      - name: Analyze
        run: npm run analyze

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate licenses manifest (advisory)
        continue-on-error: true
        run: npm run licenses

      - name: Enforce coverage threshold
        env:
          MIN_COVERAGE: "55"
        run: npm run coverage:check

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  build-smoke:
    name: Build smoke (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Read pinned Flutter version from .fvmrc
        id: fvm
        shell: bash
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Install Dart (for fvm bootstrap)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Cache fvm versions
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/fvm/versions
            ~/AppData/Roaming/fvm/versions
          key: fvm-${{ runner.os }}-${{ steps.fvm.outputs.version }}

      - name: Install fvm and pinned Flutter
        shell: bash
        run: |
          dart pub global activate fvm
          if [ -n "$PUB_CACHE" ]; then
            PUB_BIN="${PUB_CACHE//\\//}/bin"
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            PUB_BIN="${LOCALAPPDATA//\\//}/Pub/Cache/bin"
          else
            PUB_BIN="$HOME/.pub-cache/bin"
          fi
          echo "$PUB_BIN" >> "$GITHUB_PATH"
          export PATH="$PUB_BIN:$PATH"
          npm run setup:flutter

      - name: Install Linux desktop deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libepoxy-dev libmpv-dev mpv libunwind-dev

      - name: Flutter pub get
        run: fvm flutter pub get

      - name: Build smoke
        shell: bash
        env:
          CI: "true"
        run: npm run check:build-smoke

      - name: Build macOS XPC update helper
        if: matrix.os == 'macos-latest'
        shell: bash
        run: npm run check:mac:xpc-helper
