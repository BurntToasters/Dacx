name: dacx
description: "Quick, lightweight cross-platform media player."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_windows_video: ^1.0.10
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_linux: ^1.1.4
  file_picker: ^9.2.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  http: ^1.3.0
  desktop_drop: ^0.5.0
  window_manager: ^0.4.3
  path: ^1.9.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.0

msix_config:
  display_name: DACX
  publisher_display_name: run.rosie
  identity_name: run.rosie.dacx
  msix_version: 0.1.0.0
  logo_path: assets/icon/icon.png
  capabilities: internetClient
  output_name: DACX-Windows-x64
  install_certificate: false

flutter:
  uses-material-design: true
